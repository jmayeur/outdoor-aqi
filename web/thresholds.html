<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AQI Thresholds</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/theme.css">
    <style>
        #bar-chart { display: block; width: 100% !important; }
    </style>
</head>

<body>
    <div class="chart-wrapper">
        <canvas id="bar-chart"></canvas>
    </div>

    <div class="controls">
        <div class="control-group">
            <label for="sensor-selector">Sensor</label>
            <select id="sensor-selector">
                <option value="outdoor">Outdoor</option>
                <option value="indoor">Indoor</option>
            </select>
        </div>
    </div>

    <script src="./threshold_parser.js"></script>
    <script src="./js/sensor-state.js"></script>
    <script>
        const applyState = () => {
            const sensor = SensorState.read();
            document.getElementById('sensor-selector').value = sensor;
            document.title = `AQI Thresholds \u2013 ${SensorState.label(sensor)}`;
            showThresholdChart(SensorState.label(sensor));
        };

        document.getElementById('sensor-selector').addEventListener('change', e => {
            SensorState.write(e.target.value, true);
            document.title = `AQI Thresholds \u2013 ${SensorState.label(e.target.value)}`;
            showThresholdChart(SensorState.label(e.target.value));
        });

        window.addEventListener('popstate', applyState);
        SensorState.write(SensorState.read(), false);
        applyState();
    </script>
</body>
</html>
