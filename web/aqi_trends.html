<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AQI Trends</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/theme.css">
    <style>
        /* ── Mobile fullscreen overrides ───────────── */
        body { padding: 0; overflow: hidden; }

        .container {
            overflow: hidden;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #canvas { background: #0d0d1a; display: block; width: 480px; height: 800px; }

        @media screen and (max-width: 500px) {
            #canvas { width: 440px; }
        }
    </style>
</head>

<body>
    <div class="container">
        <canvas id="canvas" width="480" height="800"></canvas>
    </div>

    <script src="./aq_trends_hr.js"></script>
    <script src="./js/sensor-state.js"></script>
    <script>
        const sensor = SensorState.read();
        SensorState.write(sensor, false);
        document.title = `AQI Trends \u2013 ${SensorState.label(sensor)}`;
        showTrendChart(SensorState.label(sensor));
    </script>
</body>
</html>
