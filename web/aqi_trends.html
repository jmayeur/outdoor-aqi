<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AQI Trends</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            background: #0d0d1a;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .container {
            overflow: hidden;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #canvas {
            background: #0d0d1a;
            display: block;
            width: 480px;
            height: 800px;
        }

        @media screen and (max-width: 500px) {
            #canvas { width: 440px; }
        }
    </style>
</head>

<body>
    <div class="container">
        <canvas id="canvas" width="480" height="800"></canvas>
    </div>

    <script src="./aq_trends_hr.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const rawSensor = (params.get('sensor') || 'outdoor').toLowerCase();
        const sensor = rawSensor === 'indoor' ? 'indoor' : 'outdoor';
        const source = sensor === 'indoor' ? 'Indoor' : 'Outdoor';

        // Normalise URL without adding a history entry
        history.replaceState({ sensor }, '', `${window.location.pathname}?sensor=${sensor}`);
        document.title = `AQI Trends – ${source}`;

        showTrendChart(source);
    </script>
</body>
</html>
